<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión Comercial Avanzada y Lotes</title>
<style>
/* Estilos Generales Adaptados a Móvil y Escritorio */
body{font-family:Arial, sans-serif;background:#f2f2f2;padding:10px;margin:0;color:#333;font-size:14px}
h1{text-align:center;color:#1e293b;font-size:18px;margin:10px 0}
.container{max-width:600px;margin:0 auto}
input,button,select,textarea{padding:8px;font-size:14px;border-radius:6px;box-sizing:border-box}
input,select,textarea{border:1px solid #cbd5e1;background:#fff;width:100%}
button{border:none;cursor:pointer;font-weight:bold}
.add{background:#2563eb;color:#fff;width:auto;padding:8px 15px}

/* MENÚ DE PESTAÑAS SECCIONALES */
.nav-menu {display:grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 12px; background: #fff; padding: 6px; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.1)}
.nav-menu div {text-align: center;}
.nav-btn {background:#f1f5f9; color:#475569; padding: 8px 2px; font-size: 11px; border-radius: 6px; text-align: center; display: block; text-decoration: none;}
.nav-btn.active {background:#2563eb; color:#fff}
.nav-btn span {font-size: 16px; display:block; margin-bottom: 2px;}

/* VISTAS DE PÁGINA */
.tab-content {display: none;}
.tab-content.active {display: block;}

/* TARJETAS DE LOTES */
.card{background:#fff;padding:10px 12px;border-radius:10px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.title{font-size:15px;font-weight:bold;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.total-wrapper{display:flex;align-items:center;gap:5px}
.total-label{font-size:11px;color:#64748b;text-transform:uppercase}
.total{font-size:24px;font-weight:bold;color:#2563eb}
.card-body{display:flex;gap:10px;align-items:center;justify-content:space-between}
.controls{display:flex;gap:6px}
.controls button{width:45px;height:36px;padding:0;color:#fff;font-size:20px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.minus{background:#dc2626}
.plus{background:#16a34a}
.history-toggle{background:#f1f5f9;color:#475569;font-size:12px;padding:6px 10px;border-radius:6px;width:auto}
.delete{background:#6b7280;color:#fff;padding:6px 10px;font-size:11px;border-radius:6px;width:auto}

/* HISTORIAL INTERNO DE LOTES */
.day-block {padding:6px 0; border-bottom:1px solid #f1f5f9;}
.day-block:last-child {border-bottom:none;}
.day{display:flex;justify-content:space-between;align-items:center;gap:6px}
.day input[type="date"], .day input[type="month"], .day input[type="number"]{padding:4px;font-size:13px;border-radius:4px;width:auto}
.day input[type="date"], .day input[type="month"]{flex:2;min-width:100px}
.day input[type="number"]{width:50px;text-align:center}
.btn-del-log{background:#ef4444;color:white;padding:4px 8px;font-size:11px;border-radius:4px}
.group-filter{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;color:#64748b}
.group-filter select{width:auto;padding:3px;font-size:12px}

/* FILAS DE NOTAS POR FECHA */
.day-notes {display:grid; grid-template-columns: 1fr 1fr; gap:6px; margin-top:5px; padding-left: 2px;}
.day-notes input {font-size:11px; padding:4px 6px; border-radius:4px;}
.note-pub {border-left: 3px solid #2563eb;}
.note-priv {border-left: 3px solid #ef4444;}

/* GESTOR DE UNIDADES EN AJUSTES */
.unit-tag {display:inline-flex; align-items:center; gap:6px; background:#f1f5f9; border:1px solid #cbd5e1; padding:4px 8px; border-radius:6px; font-size:12px; margin-right:4px; margin-bottom:4px;}
.unit-tag button {background:none; color:#ef4444; font-size:12px; padding:0; cursor:pointer;}

/* FORMULARIOS */
.section-card{background:#fff;padding:12px;border-radius:10px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-group{margin-bottom:8px}
.form-group label{display:block;font-size:12px;font-weight:bold;margin-bottom:3px;color:#475569}
.backup-zone{display:flex;gap:10px;margin-top:10px}
.btn-export{background:#0f766e;color:#fff;flex:1;padding:10px;font-size:13px;border-radius:6px}
.btn-import{background:#b45309;color:#fff;flex:1;padding:10px;font-size:13px;border-radius:6px;text-align:center;position:relative}
#file-input{display:none}

/* TARJETAS DEL ARCHIVO HISTÓRICO */
.doc-card {background:#fff; border:1px solid #e2e8f0; padding:10px; border-radius:8px; margin-bottom:8px; box-shadow:0 1px 2px rgba(0,0,0,.04)}
.doc-card-header {display:flex; justify-content:space-between; align-items:center; font-weight:bold; font-size:13px; border-bottom:1px solid #f1f5f9; padding-bottom:4px; margin-bottom:6px}
.badge {padding:2px 6px; border-radius:4px; font-size:11px; color:#fff}
.badge.albaran {background:#06b6d4}
.badge.factura {background:#8b5cf6}
.doc-card-body {font-size:12px; color:#475569; margin-bottom:6px}
.doc-card-actions {display:flex; gap:6px; justify-content:flex-end}
.btn-action {padding:5px 10px; font-size:12px; border-radius:4px; color:#fff}
.btn-action.print {background:#10b981}
.btn-action.edit {background:#f59e0b}
.btn-action.del {background:#ef4444}

/* MODALES DE VISTA PREVIA Y EDICIÓN */
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding:10px}
.modal-content {background:#fff; padding:15px; border-radius:10px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; box-shadow: 0 4px 20px rgba(0,0,0,0.2)}
.modal-header {display:flex; justify-content:space-between; align-items:center; font-weight:bold; font-size:16px; margin-bottom:12px; border-bottom:1px solid #e2e8f0; padding-bottom:8px}
.modal-close {font-size:20px; cursor:pointer; color:#64748b}
.preview-box {background:#fff; border:1px solid #cbd5e1; padding:15px; border-radius:6px; font-family:Courier, monospace; font-size:12px; max-height:40vh; overflow-y:auto; margin-bottom:12px; color:#000}

/* ESTILOS DE IMPRESIÓN LIMPIOS (PAPEL Y PDF) */
#preview-documento{display:none;background:#fff;padding:30px;color:#000}
.doc-header{display:flex;justify-content:space-between;border-bottom:2px solid #1e293b;padding-bottom:15px;margin-bottom:15px}
.doc-col{width:48%; line-height:1.5;}
.doc-title{font-size:24px;font-weight:bold;text-transform:uppercase;margin-bottom:5px;letter-spacing:1px;color:#0f172a}
.doc-table{width:100%;border-collapse:collapse;margin:20px 0}
.doc-table th, .doc-table td{padding:10px 8px;border:1px solid #cbd5e1;font-size:13px}
.doc-table th{background:#f8fafc;text-align:left;font-weight:bold;color:#1e293b}
.doc-totals{float:right;width:45%;margin-top:15px}
.doc-totals-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.doc-totals-row.final{font-weight:bold;font-size:15px;border-top:2px solid #1e293b;padding-top:8px;color:#0f172a}
.firma-box{width:45%; border-top:1px dashed #64748b; text-align:center; padding-top:8px; font-size:12px; color:#475569; margin-top:60px;}
.clear{clear:both}

@media print {
    body { background: #fff; padding: 0; margin: 0; color: #000; }
    .no-print, h1, .nav-menu, .tab-content, .modal, button { display: none !important; }
    #preview-documento { display: block !important; padding: 0; border: none; box-shadow: none; margin: 0; }
}
</style>
</head>
<body>

<div class="container">
    <h1 class="no-print">📦 Control de Lotes y Facturación</h1>

    <div class="nav-menu no-print">
        <div><button class="nav-btn active" onclick="switchTab('lotes')" id="nav-lotes"><span>📦</span>Lotes</button></div>
        <div><button class="nav-btn" onclick="switchTab('crear-doc')" id="nav-crear-doc"><span>📄</span>Crear Doc</button></div>
        <div><button class="nav-btn" onclick="switchTab('archivo')" id="nav-archivo"><span>📁</span>Historial Doc</button></div>
        <div><button class="nav-btn" onclick="switchTab('config')" id="nav-config"><span>⚙️</span>Ajustes</button></div>
    </div>

    <div id="tab-lotes" class="tab-content active no-print">
        <div class="top" style="display:flex; gap:8px; margin-bottom:15px;">
            <input id="nombre" placeholder="Nombre del nuevo lote..." style="flex:2;">
            <select id="unidad-lote" style="flex:1; min-width:90px;"></select>
            <button class="add" onclick="crearLote()">Añadir</button>
        </div>
        <div id="lista-lotes"></div>
    </div>

    <div id="tab-crear-doc" class="tab-content no-print">
        <div class="section-card">
            <div style="font-weight:bold; margin-bottom:10px; color:#1e293b;">Emitir Nuevo Documento Comercial</div>
            <div class="grid-2">
                <div class="form-group"><label>Lote de Origen</label><select id="doc-lote"></select></div>
                <div class="form-group">
                    <label>Tipo Documento</label>
                    <select id="doc-tipo" onchange="checkTipoDocumento('crear')">
                        <option value="albaran">Albarán de Entrega</option>
                        <option value="factura">Factura Ordinaria</option>
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Desde Fecha</label><input type="date" id="doc-desde"></div>
                <div class="form-group"><label>Hasta Fecha</label><input type="date" id="doc-hasta"></div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Nº Documento (Opcional)</label>
                    <input id="doc-numero-personalizado" placeholder="Auto-secuencial si se deja vacío">
                </div>
                <div class="form-group">
                    <label>Cliente / Receptor</label>
                    <input id="cli-nombre" placeholder="Nombre del cliente">
                </div>
            </div>
            <div class="form-group">
                <label>Descripción del Servicio / Línea Detalle</label>
                <input id="doc-descripcion-personalizada" placeholder="Ej: Viajes de transporte, Material entregado...">
            </div>
            <div id="wrapper-precios-crear" style="display:none;" class="grid-2">
                <div class="form-group"><label>Precio Unitario (€)</label><input type="number" step="0.01" id="doc-precio" value="0.00"></div>
                <div class="form-group"><label>IVA (%)</label><input type="number" id="doc-iva" value="21"></div>
            </div>
            <button class="add" style="width:100%; margin-top:5px; background:#2563eb;" onclick="lanzarPrevisualizacionNueva()">👀 Previsualizar Documento</button>
        </div>
    </div>

    <div id="tab-archivo" class="tab-content no-print">
        <div id="lista-documentos"></div>
    </div>

    <div id="tab-config" class="tab-content no-print">
        <div class="section-card">
            <div style="font-weight:bold; font-size:13px; color:#1e293b; margin-bottom:8px;">📐 GESTIÓN DE UNIDADES DE MEDIDA</div>
            <div style="display:flex; gap:6px; margin-bottom:10px;">
                <input id="nueva-unidad-txt" placeholder="Ej: Palets, Horas, Litros...">
                <button class="add" style="background:#0f766e;" onclick="anadirUnidadSistema()">+ Añadir</button>
            </div>
            <div id="lista-unidades-config" style="margin-bottom:15px; min-height:20px;"></div>

            <hr style="border:0; border-top:1px dashed #cbd5e1; margin:15px 0;">
            <div style="font-weight:bold; font-size:13px; color:#1e293b; margin-bottom:8px;">🏢 DATOS DE EMPRESA (EMISOR)</div>
            <div class="grid-2">
                <div class="form-group"><label>Tu Empresa / Emisor</label><input id="cfg-nombre" onchange="guardarConfig()"></div>
                <div class="form-group"><label>CIF / NIF</label><input id="cfg-cif" onchange="guardarConfig()"></div>
            </div>
            <div class="form-group"><label>Dirección Postal y Comercial</label><input id="cfg-direccion" onchange="guardarConfig()"></div>
            
            <hr style="border:0; border-top:1px dashed #cbd5e1; margin:15px 0;">
            <div style="font-weight:bold; font-size:12px; color:#475569; margin-bottom:5px;">💾 COPIAS DE SEGURIDAD GENERALES</div>
            <div class="backup-zone">
                <button class="btn-export" onclick="exportarTodo()">📤 Exportar Todo (.json)</button>
                <label class="btn-import">
                    📥 Importar Todo
                    <input type="file" id="file-input" accept=".json" onchange="importarTodo(this)">
                </label>
            </div>
        </div>
    </div>

    <div id="preview-documento"></div>
</div>

<div id="modal-preview" class="modal no-print">
    <div class="modal-content" style="max-width:550px;">
        <div class="modal-header">
            <span id="preview-modal-titulo">👀 Vista Previa del Documento</span>
            <span class="modal-close" onclick="cerrarModalPreview()">&times;</span>
        </div>
        <div id="preview-html-interno" class="preview-box"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="accionGuardarSolo()" style="background:#0f766e; color:#fff; padding:12px; border-radius:6px; font-weight:bold;">💾 Solo Guardar</button>
            <button onclick="accionGuardarEImprimir()" style="background:#16a34a; color:#fff; padding:12px; border-radius:6px; font-weight:bold;">🖨️ Guardar e Imprimir</button>
        </div>
        <button onclick="cerrarModalPreview()" style="background:#6b7280; color:#fff; padding:8px; border-radius:6px; width:100%; margin-top:8px; font-size:12px;">✕ Cancelar</button>
    </div>
</div>

<div id="modal-edicion" class="modal no-print">
    <div class="modal-content">
        <div class="modal-header">
            <span>✏️ Modificar Documento Guardado</span>
            <span class="modal-close" onclick="cerrarModal()">&times;</span>
        </div>
        <input type="hidden" id="edit-doc-id">
        <input type="hidden" id="edit-doc-tipo">
        <div class="grid-2">
            <div class="form-group"><label>Nº Documento</label><input id="edit-doc-num-display"></div>
            <div class="form-group"><label>Cliente / Receptor</label><input id="edit-cli-nombre"></div>
        </div>
        <div class="form-group"><label>Descripción del Concepto</label><input id="edit-descripcion"></div>
        <div id="wrapper-precios-edit" class="grid-2">
            <div class="form-group"><label>Precio (€)</label><input type="number" step="0.01" id="edit-precio"></div>
            <div class="form-group"><label>IVA (%)</label><input type="number" id="edit-iva"></div>
        </div>
        <div style="font-weight:bold; font-size:12px; margin:10px 0 5px; color:#475569;">Líneas de Registro Asociadas:</div>
        <div id="edit-lineas-container" style="max-height:200px; overflow-y:auto; border:1px solid #e2e8f0; padding:5px; border-radius:6px; margin-bottom:12px;"></div>
        <button class="add" style="width:100%; background:#f59e0b;" onclick="guardarCambiosDocumento()">💾 Guardar Cambios Permanentes</button>
    </div>
</div>

<script>
// Base de datos reactiva local
let datos = JSON.parse(localStorage.getItem('contador_editable')) || [];
let documentosGuardados = JSON.parse(localStorage.getItem('documentos_guardados')) || [];
let config = JSON.parse(localStorage.getItem('contador_config')) || { nombre:'', cif:'', direccion:'' };
let unidadesSistema = JSON.parse(localStorage.getItem('unidades_sistema')) || ['Viajes', 'Palets', 'Unidades', 'Kg', 'Horas'];
let estadoUI = {}; 
let documentoTemporalEnCreacion = null; 

function guardarBBDD(){ 
    localStorage.setItem('contador_editable', JSON.stringify(datos)); 
    localStorage.setItem('documentos_guardados', JSON.stringify(documentosGuardados));
    localStorage.setItem('unidades_sistema', JSON.stringify(unidadesSistema));
}

function guardarConfig(){
    config.nombre = document.getElementById('cfg-nombre').value;
    config.cif = document.getElementById('cfg-cif').value;
    config.direccion = document.getElementById('cfg-direccion').value;
    localStorage.setItem('contador_config', JSON.stringify(config));
    renderAll();
}

function cargarConfigUI(){
    document.getElementById('cfg-nombre').value = config.nombre || '';
    document.getElementById('cfg-cif').value = config.cif || '';
    document.getElementById('cfg-direccion').value = config.direccion || '';
    renderUnidadesConfig();
}

function fechaHoy(){ return new Date().toISOString().split('T')[0]; }

function obtenerSiguienteNumeroSecuencial(tipo) {
    let maxNum = 0;
    documentosGuardados.forEach(d => {
        if(d.tipo === tipo && d.numeroDocumento) {
            let numParsed = parseInt(d.numeroDocumento);
            if(!isNaN(numParsed) && numParsed > maxNum) {
                maxNum = numParsed;
            }
        }
    });
    return maxNum + 1;
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    document.getElementById('nav-' + tabId).classList.add('active');
    renderAll();
    
    if(tabId === 'crear-doc') {
        let tipoActual = document.getElementById('doc-tipo').value;
        document.getElementById('doc-numero-personalizado').placeholder = "Siguiente sugerido: " + obtenerSiguienteNumeroSecuencial(tipoActual);
    }
}

function toggleHistorial(i){ if(!estadoUI[i]) estadoUI[i] = { abierto: false, agrupacion: 'diario' }; estadoUI[i].abierto = !estadoUI[i].abierto; renderAll(); }
function cambiarAgrupacion(i, valor){ if(!estadoUI[i]) estadoUI[i] = { abierto: true, agrupacion: 'diario' }; estadoUI[i].agrupacion = valor; renderAll(); }

function checkTipoDocumento(modo){
    if(modo === 'crear') {
        let tipoActual = document.getElementById('doc-tipo').value;
        document.getElementById('wrapper-precios-crear').style.display = (tipoActual === 'factura') ? 'flex' : 'none';
        document.getElementById('doc-numero-personalizado').placeholder = "Siguiente sugerido: " + obtenerSiguienteNumeroSecuencial(tipoActual);
    } else {
         document.getElementById('wrapper-precios-edit').style.display = (document.getElementById('edit-doc-tipo').value === 'factura') ? 'flex' : 'none';
    }
}

function guardarNotaRegistro(indexLote, indexHist, tipo, valor) {
    if(tipo === 'pub') datos[indexLote].historial[indexHist].notaPub = valor;
    if(tipo === 'priv') datos[indexLote].historial[indexHist].notaPriv = valor;
    guardarBBDD();
}

// Lógica de añadir/eliminar unidades en Ajustes
function anadirUnidadSistema() {
    let txt = document.getElementById('nueva-unidad-txt').value.trim();
    if(txt === '') return;
    if(!unidadesSistema.includes(txt)) {
        unidadesSistema.push(txt);
        guardarBBDD();
        document.getElementById('nueva-unidad-txt').value = '';
        renderUnidadesConfig();
        renderSelectorUnidadesLote();
    }
}

function eliminarUnidadSistema(uni) {
    if(confirm(`¿Eliminar la unidad "${uni}" de las opciones predefinidas?`)) {
        unidadesSistema = unidadesSistema.filter(u => u !== uni);
        guardarBBDD();
        renderUnidadesConfig();
        renderSelectorUnidadesLote();
    }
}

function renderUnidadesConfig() {
    let div = document.getElementById('lista-unidades-config');
    if(!div) return;
    div.innerHTML = '';
    unidadesSistema.forEach(u => {
        div.innerHTML += `<span class="unit-tag">${u} <button onclick="eliminarUnidadSistema('${u}')">✕</button></span>`;
    });
}

function renderSelectorUnidadesLote() {
    let select = document.getElementById('unidad-lote');
    if(!select) return;
    select.innerHTML = '';
    unidadesSistema.forEach(u => {
        let opt = document.createElement('option'); opt.value = u; opt.textContent = u;
        select.appendChild(opt);
    });
}

function renderAll(){
    renderLotes();
    renderDocumentos();
    renderSelectorUnidadesLote();
    const selectLote = document.getElementById('doc-lote');
    if(selectLote) {
        selectLote.innerHTML = '';
        datos.forEach((item, i) => {
            let opt = document.createElement('option'); opt.value = i; opt.textContent = item.nombre;
            selectLote.appendChild(opt);
        });
    }
}

// === PANEL DE LOTES ===
function renderLotes(){
    const lista = document.getElementById('lista-lotes');
    if(!lista) return;
    lista.innerHTML = '';

    datos.forEach((item, i)=>{
        if(!estadoUI[i]) estadoUI[i] = { abierto: false, agrupacion: 'diario' };
        const vistaActual = estadoUI[i].agrupacion;
        const unidadLote = item.unidad || 'Viajes'; 

        let agrupado = {};
        item.historial.forEach((h, idxOriginal)=>{
            let clave = h.fecha; 
            if(vistaActual === 'mensual') clave = h.fecha.substring(0,7); 
            if(vistaActual === 'anual') clave = h.fecha.substring(0,4); 
            if(!agrupado[clave]) agrupado[clave] = { valor: 0, indices: [] };
            agrupado[clave].valor += h.valor;
            agrupado[clave].indices.push(idxOriginal); 
        });

        let historialHTML = '';
        const clavesOrdenadas = Object.keys(agrupado).sort().reverse();
        if(clavesOrdenadas.length === 0) historialHTML = `<div style="color:#94a3b8; font-size:12px; text-align:center; padding:5px;">Sin movimientos registrados</div>`;

        clavesOrdenadas.forEach(clave => {
            let inputFechaHTML = '';
            if(vistaActual === 'diario') inputFechaHTML = `<input type="date" value="${clave}" onchange="editarFecha(${i}, [${agrupado[clave].indices}], this.value, 'diario')">`;
            else if(vistaActual === 'mensual') inputFechaHTML = `<input type="month" value="${clave}" onchange="editarFecha(${i}, [${agrupado[clave].indices}], this.value, 'mensual')">`;
            else inputFechaHTML = `<input type="number" min="2000" max="2100" value="${clave}" onchange="editarFecha(${i}, [${agrupado[clave].indices}], this.value, 'anual')">`;

            let notasHTML = '';
            if(vistaActual === 'diario' && agrupado[clave].indices.length > 0) {
                let primaryIndex = agrupado[clave].indices[0];
                let notaPub = item.historial[primaryIndex].notaPub || '';
                let notaPriv = item.historial[primaryIndex].notaPriv || '';
                
                notasHTML = `
                <div class="day-notes">
                    <input type="text" class="note-pub" placeholder="Nota Pública (Va al Doc)" value="${notaPub}" onchange="guardarNotaRegistro(${i}, ${primaryIndex}, 'pub', this.value)">
                    <input type="text" class="note-priv" placeholder="Nota Privada (Interna)" value="${notaPriv}" onchange="guardarNotaRegistro(${i}, ${primaryIndex}, 'priv', this.value)">
                </div>`;
            }

            historialHTML += `
            <div class="day-block">
                <div class="day">
                    ${inputFechaHTML}
                    <div style="display:flex; gap:4px; align-items:center;">
                        <input type="number" value="${agrupado[clave].valor}" onchange="editarValorAgrupado(${i}, [${agrupado[clave].indices}], this.value)">
                        <button class="btn-del-log" onclick="eliminarRegistros(${i}, [${agrupado[clave].indices}])">✕</button>
                    </div>
                </div>
                ${notasHTML}
            </div>`;
        });

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
        <div class="card-header">
            <div class="title">${item.nombre}</div>
            <div class="total-wrapper">
                <span class="total-label">${unidadLote}:</span>
                <span class="total">${item.total}</span>
            </div>
        </div>
        <div class="card-body">
            <div class="controls">
                <button class="minus" onclick="menos(${i})">−</button>
                <button class="plus" onclick="mas(${i})">+</button>
            </div>
            <button class="history-toggle" onclick="toggleHistorial(${i})">Historial 🕒</button>
            <button class="delete" onclick="eliminarLote(${i})">Borrar</button>
        </div>
        <div class="tab-content ${estadoUI[i].abierto ? 'active' : ''}" style="margin-top:8px; padding-top:8px; border-top:1px dashed #e2e8f0;">
            <div class="group-filter">
                <span>Organizar por:</span>
                <select onchange="cambiarAgrupacion(${i}, this.value)">
                    <option value="diario" ${vistaActual === 'diario' ? 'selected' : ''}>Días</option>
                    <option value="mensual" ${vistaActual === 'mensual' ? 'selected' : ''}>Meses</option>
                    <option value="anual" ${vistaActual === 'anual' ? 'selected' : ''}>Años</option>
                </select>
            </div>
            <div>${historialHTML}</div>
        </div>`;
        lista.appendChild(card);
    });
}

function crearLote(){
    const texto = document.getElementById('nombre').value.trim();
    const unidadSel = document.getElementById('unidad-lote').value;
    if(texto === ''){ return; }
    datos.push({ nombre: texto, unidad: unidadSel, total: 0, historial: [] });
    document.getElementById('nombre').value = ''; 
    guardarBBDD(); renderAll();
}

function mas(i){ datos[i].total++; datos[i].historial.push({ fecha: fechaHoy(), valor: 1, notaPub: '', notaPriv: '' }); guardarBBDD(); renderAll(); }
function menos(i){ if(datos[i].total > 0){ datos[i].total--; datos[i].historial.push({ fecha: fechaHoy(), valor: -1, notaPub: '', notaPriv: '' }); guardarBBDD(); renderAll(); } }

function editarFecha(indexLote, indicesHistorial, nuevaFecha, tipo){
    indicesHistorial.forEach(idx => {
        if(tipo === 'diario') datos[indexLote].historial[idx].fecha = nuevaFecha;
        if(tipo === 'mensual') datos[indexLote].historial[idx].fecha = nuevaFecha + datos[indexLote].historial[idx].fecha.substring(7);
        if(tipo === 'anual') datos[indexLote].historial[idx].fecha = nuevaFecha + datos[indexLote].historial[idx].fecha.substring(4);
    });
    guardarBBDD(); renderAll();
}
function editarValorAgrupado(indexLote, indicesHistorial, nuevoValor){
    nuevoValor = parseInt(nuevoValor) || 0; let totalActualGrupo = 0;
    indicesHistorial.forEach(idx => { totalActualGrupo += datos[indexLote].historial[idx].valor; });
    let diferencia = nuevoValor - totalActualGrupo;
    if(indicesHistorial.length > 0){
        datos[indexLote].historial[indicesHistorial[indicesHistorial.length - 1]].valor += diferencia;
    } else {
        datos[indexLote].historial.push({ fecha: fechaHoy(), valor: nuevoValor, notaPub: '', notaPriv: '' });
    }
    recargarTotalLote(indexLote); guardarBBDD(); renderAll();
}
function eliminarRegistros(indexLote, indicesHistorial){
    if(confirm('¿Eliminar estos registros del historial?')){
        indicesHistorial.sort((a,b) => b - a).forEach(idx => { datos[indexLote].historial.splice(idx, 1); });
        recargarTotalLote(indexLote); guardarBBDD(); renderAll();
    }
}
function recargarTotalLote(indexLote){
    let nuevoTotal = datos[indexLote].historial.reduce((acc, h) => acc + h.valor, 0);
    datos[indexLote].total = nuevoTotal < 0 ? 0 : nuevoTotal;
}
function eliminarLote(i){ if(confirm('¿Eliminar este lote completo permanentemente?')){ datos.splice(i,1); guardarBBDD(); renderAll(); } }

// === LOGICA DE EMISION DE COMPROBANTES ===
function lanzarPrevisualizacionNueva() {
    const loteIndex = document.getElementById('doc-lote').value;
    if(loteIndex === "" || !datos[loteIndex]) { alert("Por favor, selecciona un lote de origen."); return; }
    
    const lote = datos[loteIndex];
    const unidadLote = lote.unidad || 'Viajes';
    const tipo = document.getElementById('doc-tipo').value;
    const desde = document.getElementById('doc-desde').value;
    const hasta = document.getElementById('doc-hasta').value;
    const cliente = document.getElementById('cli-nombre').value.trim() || 'Cliente General';
    let descripcion = document.getElementById('doc-descripcion-personalizada').value.trim() || ("Lote: " + lote.nombre);
    
    let numeroInput = document.getElementById('doc-numero-personalizado').value.trim();
    if(numeroInput === "") { numeroInput = obtenerSiguienteNumeroSecuencial(tipo).toString(); }
    
    const precio = parseFloat(document.getElementById('doc-precio').value) || 0;
    const iva = parseFloat(document.getElementById('doc-iva').value) || 0;

    let agrupadoFechas = {};
    lote.historial.forEach(h => {
        if(desde && h.fecha < desde) return; 
        if(hasta && h.fecha > hasta) return;
        if(!agrupadoFechas[h.fecha]) agrupadoFechas[h.fecha] = { cantidad: 0, notaPub: h.notaPub || '' };
        agrupadoFechas[h.fecha].cantidad += h.valor;
    });

    let lineas = [];
    Object.keys(agrupadoFechas).sort().forEach(fecha => {
        if(agrupadoFechas[fecha].cantidad !== 0) {
            lineas.push({ 
                fecha: fecha, 
                cantidad: agrupadoFechas[fecha].cantidad,
                notaPub: agrupadoFechas[fecha].notaPub
            });
        }
    });

    if(lineas.length === 0){ alert("No hay movimientos en las fechas seleccionadas para este lote."); return; }

    documentoTemporalEnCreacion = {
        id: "doc_" + Date.now(),
        numeroDocumento: numeroInput,
        fechaDocumento: fechaHoy(),
        fechaDesde: desde,
        fechaHasta: hasta,
        tipo: tipo,
        cliente: cliente,
        descripcion: descripcion,
        precio: precio,
        iva: iva,
        unidad: unidadLote,
        lineas: lineas
    };

    let titDoc = tipo === 'albaran' ? 'ALBARÁN DE ENTREGA (Borrador)' : 'FACTURA ORDINARIA (Borrador)';
    let encabezadoTemporalHTML = desde && hasta ? `<strong>PERÍODO:</strong> Del ${desde} al ${hasta}<br>` : `<strong>FECHA EMISIÓN:</strong> ${fechaHoy()}<br>`;

    let borradorHTML = `
        <div style="border-bottom:2px solid #0f172a; padding-bottom:6px; margin-bottom:10px; font-size:12px; line-height:1.4;">
            <div style="font-weight:bold; font-size:14px; text-transform:uppercase; color:#0f172a;">${titDoc}</div>
            <strong>Nº DOCUMENTO:</strong> ${numeroInput}<br>
            <strong>EMISOR:</strong> ${config.nombre || 'No configurado'}<br>
            ${encabezadoTemporalHTML}
            <strong>CLIENTE:</strong> ${cliente}
        </div>
        <table style="width:100%; font-size:11px; text-align:left; border-collapse:collapse;">
            <thead>
                <tr style="background:#f8fafc; border-bottom:1px solid #cbd5e1;">
                    <th style="padding:4px;">Fecha</th>
                    <th style="padding:4px;">Descripción</th>
                    <th style="text-align:center; padding:4px;">${unidadLote}</th>
                    ${tipo==='factura'?'<th style="text-align:right; padding:4px;">Precio</th><th style="text-align:right; padding:4px;">Total</th>':''}
                </tr>
            </thead>
            <tbody>
    `;

    let totalUnidades = 0;
    lineas.forEach(l => {
        totalUnidades += l.cantidad;
        let anotacionExtra = l.notaPub ? ` <span style="color:#2563eb; font-style:italic;">(${l.notaPub})</span>` : '';
        if(tipo === 'factura') {
            borradorHTML += `<tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:4px;">${l.fecha}</td><td style="padding:4px;">${descripcion}${anotacionExtra}</td><td style="text-align:center; padding:4px;">${l.cantidad}</td><td style="text-align:right; padding:4px;">${precio.toFixed(2)}€</td><td style="text-align:right; padding:4px;">${(l.cantidad*precio).toFixed(2)}€</td></tr>`;
        } else {
            borradorHTML += `<tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:4px;">${l.fecha}</td><td style="padding:4px;">${descripcion}${anotacionExtra}</td><td style="text-align:center; padding:4px; font-weight:bold;">${l.cantidad}</td></tr>`;
        }
    });

    borradorHTML += `</tbody></table><div style="margin-top:12px; border-top:1px dashed #0f172a; padding-top:6px; text-align:right;">`;
    
    if(tipo === 'factura') {
        let bi = totalUnidades * precio; let cIva = bi * (iva/100);
        borradorHTML += `<span style="font-size:11px; color:#475569;">Base Imponible: ${bi.toFixed(2)}€ | IVA (${iva}%): ${cIva.toFixed(2)}€</span><br><span style="font-size:14px; color:#0f172a;"><strong>TOTAL FACTURA: ${(bi+cIva).toFixed(2)}€</strong></span>`;
    } else {
        borradorHTML += `<span style="font-size:14px; color:#0f172a;">TOTAL ${unidadLote.toUpperCase()}: <strong>${totalUnidades}</strong></span>`;
    }
    borradorHTML += `</div>`;

    document.getElementById('preview-modal-titulo').textContent = `👀 Confirmar Emisión`;
    document.getElementById('preview-html-interno').innerHTML = borradorHTML;
    document.getElementById('modal-preview').style.display = 'flex';
}

function cerrarModalPreview() { document.getElementById('modal-preview').style.display = 'none'; documentoTemporalEnCreacion = null; }
function resetearFormularioCreacion() { document.getElementById('cli-nombre').value = ''; document.getElementById('doc-descripcion-personalizada').value = ''; document.getElementById('doc-numero-personalizado').value = ''; document.getElementById('doc-desde').value = ''; document.getElementById('doc-hasta').value = ''; }

function accionGuardarSolo() {
    if(!documentoTemporalEnCreacion) return;
    documentosGuardados.push(documentoTemporalEnCreacion);
    guardarBBDD(); resetearFormularioCreacion(); cerrarModalPreview();
    alert("¡Documento archivado!"); switchTab('archivo');
}

function accionGuardarEImprimir() {
    if(!documentoTemporalEnCreacion) return;
    documentosGuardados.push(documentoTemporalEnCreacion);
    guardarBBDD(); let docAImprimir = documentoTemporalEnCreacion;
    resetearFormularioCreacion(); cerrarModalPreview();
    imprimirDocumentoObj(docAImprimir);
}

// === HISTORIAL ARCHIVADO ===
function renderDocumentos() {
    const contenedor = document.getElementById('lista-documentos');
    if(!contenedor) return;
    contenedor.innerHTML = '<div style="font-weight:bold; margin-bottom:10px; color:#1e293b;">📁 Albaranes y Facturas Archivadas</div>';
    
    if(documentosGuardados.length === 0) {
        contenedor.innerHTML += `<div style="text-align:center; color:#94a3b8; padding:20px; background:#fff; border-radius:10px;">No hay documentos registrados todavía.</div>`;
        return;
    }

    documentosGuardados.slice().reverse().forEach(doc => {
        let totalUnidades = doc.lineas.reduce((acc, l) => acc + l.cantidad, 0);
        let uni = doc.unidad || 'Unidades';
        let infoEconomica = doc.tipo === 'factura' ? 
            `<div><strong>Total Cobro:</strong> ${(totalUnidades * doc.precio * (1 + doc.iva/100)).toFixed(2)} € <span style="font-size:11px; color:#64748b;">(${totalUnidades} ${uni.toLowerCase()} x ${doc.precio.toFixed(2)}€)</span></div>` :
            `<div><strong>Volumen Suministro:</strong> ${totalUnidades} ${uni}</div>`;

        let desgloseLineasHTML = '<div style="font-size:11px; background:#f8fafc; padding:5px; border-radius:6px; margin-top:4px; border:1px solid #e2e8f0;">';
        doc.lineas.forEach(l => {
            let tagNota = l.notaPub ? ` <span style="color:#2563eb;">[${l.notaPub}]</span>` : '';
            desgloseLineasHTML += `<div>• ${l.fecha}: <strong>${l.cantidad}</strong> ${uni.toLowerCase()}${tagNota}</div>`;
        });
        desgloseLineasHTML += '</div>';

        let card = document.createElement('div');
        card.className = 'doc-card';
        card.innerHTML = `
            <div class="doc-card-header">
                <span>Nº Doc: <strong>${doc.numeroDocumento || '---'}</strong></span>
                <span class="badge ${doc.tipo}">${doc.tipo.toUpperCase()}</span>
            </div>
            <div class="doc-card-body">
                <div><strong>Cliente:</strong> ${doc.cliente}</div>
                <div><strong>Concepto:</strong> ${doc.descripcion}</div>
                ${infoEconomica}
                ${desgloseLineasHTML}
            </div>
            <div class="doc-card-actions">
                <button class="btn-action print" onclick="imprimirDocPorId('${doc.id}')">🖨️ Imprimir</button>
                <button class="btn-action edit" onclick="abrirEditorDoc('${doc.id}')">✏️ Editar</button>
                <button class="btn-action del" onclick="borrarDocPorId('${doc.id}')">✕</button>
            </div>
        `;
        contenedor.appendChild(card);
    });
}

function borrarDocPorId(id) { if(confirm("¿Eliminar permanentemente?")) { documentosGuardados = documentosGuardados.filter(d => d.id !== id); guardarBBDD(); renderAll(); } }

function abrirEditorDoc(id) {
    let doc = documentosGuardados.find(d => d.id === id);
    if(!doc) return;
    
    document.getElementById('edit-doc-id').value = doc.id;
    document.getElementById('edit-doc-tipo').value = doc.tipo;
    document.getElementById('edit-doc-num-display').value = doc.numeroDocumento || '';
    document.getElementById('edit-cli-nombre').value = doc.cliente;
    document.getElementById('edit-descripcion').value = doc.descripcion;
    document.getElementById('edit-precio').value = doc.precio;
    document.getElementById('edit-iva').value = doc.iva;
    document.getElementById('wrapper-precios-edit').style.display = (doc.tipo === 'factura') ? 'flex' : 'none';
    
    let lineasContainer = document.getElementById('edit-lineas-container');
    lineasContainer.innerHTML = '';
    doc.lineas.forEach((l, idx) => {
        let row = document.createElement('div');
        row.style = "display:grid; grid-template-columns: 110px 50px 1fr; gap:6px; margin-bottom:5px;";
        row.innerHTML = `
            <input type="date" value="${l.fecha}" id="edit-linea-fecha-${idx}">
            <input type="number" value="${l.cantidad}" id="edit-linea-cant-${idx}" style="text-align:center;">
            <input type="text" value="${l.notaPub || ''}" id="edit-linea-notapub-${idx}" placeholder="Nota pública">
        `;
        lineasContainer.appendChild(row);
    });
    document.getElementById('modal-edicion').style.display = 'flex';
}

function cerrarModal() { document.getElementById('modal-edicion').style.display = 'none'; }

function guardarCambiosDocumento() {
    let id = document.getElementById('edit-doc-id').value;
    let doc = documentosGuardados.find(d => d.id === id);
    if(!doc) return;
    
    doc.numeroDocumento = document.getElementById('edit-doc-num-display').value.trim();
    doc.cliente = document.getElementById('edit-cli-nombre').value.trim();
    doc.descripcion = document.getElementById('edit-descripcion').value.trim();
    doc.precio = parseFloat(document.getElementById('edit-precio').value) || 0;
    doc.iva = parseFloat(document.getElementById('edit-iva').value) || 0;
    
    doc.lineas.forEach((l, idx) => {
        l.fecha = document.getElementById(`edit-linea-fecha-${idx}`).value;
        l.cantidad = parseInt(document.getElementById(`edit-linea-cant-${idx}`).value) || 0;
        l.notaPub = document.getElementById(`edit-linea-notapub-${idx}`).value.trim();
    });
    
    doc.lineas = doc.lineas.filter(l => l.cantidad !== 0);
    guardarBBDD(); cerrarModal(); renderAll();
}

function imprimirDocPorId(id) { let doc = documentosGuardados.find(d => d.id === id); if(doc) imprimirDocumentoObj(doc); }

function imprimirDocumentoObj(doc) {
    let tablaHTML = ''; let totalUnidades = 0;
    let esAlbaran = (doc.tipo === 'albaran');
    let uni = doc.unidad || 'Viajes';
    
    doc.lineas.forEach(l => {
        totalUnidades += l.cantidad;
        let anotacionNota = l.notaPub ? `<br><span style="font-size:11px; color:#475569; font-style:italic;">Nota: ${l.notaPub}</span>` : '';
        if(!esAlbaran) {
            tablaHTML += `<tr><td>${l.fecha}</td><td>${doc.descripcion}${anotacionNota}</td><td style="text-align:center"> ${l.cantidad}</td><td style="text-align:right">${doc.precio.toFixed(2)} €</td><td style="text-align:right">${(l.cantidad * doc.precio).toFixed(2)} €</td></tr>`;
        } else {
            tablaHTML += `<tr><td>${l.fecha}</td><td>${doc.descripcion}${anotacionNota}</td><td style="text-align:center; font-weight:bold; font-size:14px;">${l.cantidad}</td></tr>`;
        }
    });

    let totalesHTML = !esAlbaran ? `
        <div class="doc-totals">
            <div class="doc-totals-row"><span>Total ${uni}:</span> <span>${totalUnidades}</span></div>
            <div class="doc-totals-row"><span>Base Imponible:</span> <span>${(totalUnidades*doc.precio).toFixed(2)} €</span></div>
            <div class="doc-totals-row final"><span>TOTAL FACTURA:</span> <span>${(totalUnidades*doc.precio*(1+doc.iva/100)).toFixed(2)} €</span></div>
        </div>` : `
        <div class="doc-totals" style="width: 50%;">
            <div class="doc-totals-row final"><span>TOTAL ${uni.toUpperCase()}:</span> <span>${totalUnidades}</span></div>
        </div>`;

    let firmasHTML = esAlbaran ? `
        <div style="margin-top:70px; display:flex; justify-content:space-between; width:100%;">
            <div class="firma-box" style="width:42%;">Firma Emisor</div>
            <div class="firma-box" style="width:42%; float:right;">Firma Receptor</div>
        </div>` : '';

    let tituloMostrado = esAlbaran ? 'ALBARÁN DE ENTREGA' : 'FACTURA';
    let subEncabezadoTabla = esAlbaran ? `<th>Fecha</th><th>Descripción del Suministro</th><th style="text-align:center">${uni}</th>` : `<th>Fecha</th><th>Descripción</th><th style="text-align:center">${uni}</th><th style="text-align:right">Precio</th><th style="text-align:right">Subtotal</th>`;

    document.getElementById('preview-documento').innerHTML = `
        <div class="doc-header">
            <div class="doc-col">
                <strong>EMISOR:</strong><br>
                <span style="font-size:15px; font-weight:bold;">${config.nombre || 'Comercial S.L.'}</span><br>
                NIF: ${config.cif || '---'}<br>${config.direccion || ''}
            </div>
            <div class="doc-col" style="text-align:right;">
                <span class="doc-title">${tituloMostrado}</span><br>
                <strong>Nº Documento:</strong> ${doc.numeroDocumento}
            </div>
        </div>
        <div style="background:#f8fafc; border:1px solid #e2e8f0; padding:12px; border-radius:6px; margin:10px 0;">
            <strong>CLIENTE:</strong> ${doc.cliente}
        </div>
        <table class="doc-table"><thead><tr>${subEncabezadoTabla}</tr></thead><tbody>${tablaHTML}</tbody></table>
        ${totalesHTML}<div class="clear"></div>${firmasHTML}
    `;
    window.print();
}

function exportarTodo() {
    let backupObj = { app: "ContadorFacturacion", version: "3.0", datos: datos, documentos: documentosGuardados, config: config, unidades: unidadesSistema };
    let blob = new Blob([JSON.stringify(backupObj, null, 2)], {type: "application/json"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a"); a.href = url; a.download = `copia_sistema_comercial_${fechaHoy()}.json`;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
}

function importarTodo(input) {
    if (!input.files || input.files.length === 0) return;
    let reader = new FileReader();
    reader.onload = function(e) {
        try {
            let backupObj = JSON.parse(e.target.result);
            if (backupObj.app === "ContadorFacturacion") {
                datos = backupObj.datos || []; 
                documentosGuardados = backupObj.documentos || []; 
                config = backupObj.config || { nombre:'', cif:'', direccion:'' };
                unidadesSistema = backupObj.unidades || ['Viajes', 'Palets', 'Unidades', 'Kg', 'Horas'];
                guardarBBDD(); cargarConfigUI(); renderAll();
                alert("Copia restaurada.");
            }
        } catch (err) { alert("Error al procesar el archivo."); }
    };
    reader.readAsText(input.files[0]);
}

cargarConfigUI();
renderAll();
</script>
